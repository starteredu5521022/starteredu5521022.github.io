<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: transparent;
  font-family: -apple-system, BlinkMacSystemFont, "Noto Sans TC", "PingFang TC", sans-serif;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 170px;
  padding: 0 12px;
}

#wrapper {
  width: 100%;
  max-width: 640px;
  background: linear-gradient(135deg, #EBF4E6 0%, #e2f0da 100%);
  border-radius: 14px;
  border: 1px solid rgba(25,77,51,0.12);
  box-shadow: 0 2px 12px rgba(25,77,51,0.10), 0 1px 3px rgba(25,77,51,0.08);
  padding: 12px 20px 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}

#header {
  display: flex;
  align-items: center;
  gap: 8px;
}

#badge {
  background: #C0392B;
  color: #fff;
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 0.06em;
  padding: 2px 10px;
  border-radius: 20px;
  white-space: nowrap;
  line-height: 1.5;
}

#label {
  font-size: 18px;
  font-weight: 700;
  color: #194D33;
  letter-spacing: 0.03em;
  white-space: nowrap;
}

#units {
  display: flex;
  align-items: flex-start;
  gap: 6px;
}

.unit-group {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}

.digits {
  display: flex;
  gap: 2px;
}

.colon {
  font-size: 28px;
  font-weight: 800;
  color: #194D33;
  opacity: 0.4;
  line-height: 1;
  margin-top: 10px;
}

.unit-label {
  font-size: 18px;
  font-weight: 400;
  color: #194D33;
  opacity: 0.85;
}

/* ── FlipClock tile ── */
.flip {
  list-style: none;
  position: relative;
  width: 34px;
  height: 58px;
  border-radius: 6px;
  box-shadow: 0 3px 6px rgba(0,0,0,0.30);
  -webkit-backface-visibility: hidden;
  backface-visibility: hidden;
}

.flip li {
  z-index: 1;
  position: absolute;
  left: 0; top: 0;
  width: 100%; height: 100%;
  line-height: 56px;
}
.flip li:first-child { z-index: 2; }
.flip li.active { z-index: 3; }

.flip li a {
  display: block;
  height: 100%;
  -webkit-perspective: 180px;
  perspective: 180px;
  cursor: default;
}

.flip li a .up,
.flip li a .down {
  position: absolute;
  left: 0;
  width: 100%;
  height: 50%;
  overflow: hidden;
  outline: 1px solid transparent;
}

.flip li a .up {
  top: 0;
  -webkit-transform-origin: 50% 100%;
  transform-origin: 50% 100%;
  border-radius: 6px 6px 0 0;
  border-bottom: 1px solid rgba(0,0,0,0.35);
}

.flip li a .down {
  bottom: 0;
  -webkit-transform-origin: 50% 0%;
  transform-origin: 50% 0%;
  border-radius: 0 0 6px 6px;
}

.flip li a .shadow {
  position: absolute;
  width: 100%; height: 100%;
  z-index: 2;
}

/* inn: 200% height so the full digit shows through the half-height clip */
.flip li a .up .inn {
  position: absolute;
  left: 0; top: 0;
  width: 100%; height: 200%;
  color: #fff;
  text-align: center;
  font-size: 36px;
  font-weight: 800;
  line-height: 58px;
  background: linear-gradient(180deg, #2d6b48 0%, #194D33 100%);
  border-radius: 6px;
  -webkit-backface-visibility: hidden;
  backface-visibility: hidden;
}

.flip li a .down .inn {
  position: absolute;
  left: 0; bottom: 0;
  width: 100%; height: 200%;
  color: #fff;
  text-align: center;
  font-size: 36px;
  font-weight: 800;
  line-height: 58px;
  background: #194D33;
  border-radius: 6px;
  -webkit-backface-visibility: hidden;
  backface-visibility: hidden;
}

/* ── Play animations ── */
.flip.play li.before { z-index: 3; }

.flip.play li.active {
  -webkit-animation: asd 0.5s 0.5s linear both;
  animation: asd 0.5s 0.5s linear both;
  z-index: 5;
}

.flip.play li.before .up {
  z-index: 2;
  -webkit-animation: turn2 0.5s linear both;
  animation: turn2 0.5s linear both;
}

.flip.play li.active .down {
  z-index: 2;
  -webkit-animation: turn 0.5s 0.5s linear both;
  animation: turn 0.5s 0.5s linear both;
}

/* Shadow depth during animation */
.flip.play li.before .up .shadow {
  background: linear-gradient(rgba(0,0,0,0.05) 0%, rgba(0,0,0,0.55) 100%);
  -webkit-animation: show 0.5s linear both;
  animation: show 0.5s linear both;
}
.flip.play li.active .down .shadow {
  background: linear-gradient(rgba(0,0,0,0.55) 0%, rgba(0,0,0,0.05) 100%);
  -webkit-animation: hide 0.4s 0.35s linear both;
  animation: hide 0.4s 0.35s linear both;
}

@keyframes turn2 {
  0%   { transform: rotateX(0deg); }
  100% { transform: rotateX(-90deg); }
}
@keyframes turn {
  0%   { transform: rotateX(90deg); }
  100% { transform: rotateX(0deg); }
}
@keyframes asd {
  0%   { z-index: 2; }
  20%  { z-index: 4; }
  100% { z-index: 4; }
}
@keyframes show {
  0%   { opacity: 0; }
  100% { opacity: 1; }
}
@keyframes hide {
  0%   { opacity: 1; }
  100% { opacity: 0; }
}

#ended {
  font-size: 16px;
  font-weight: 700;
  color: #194D33;
  letter-spacing: 0.04em;
}
</style>
</head>
<body>

<div id="wrapper">
  <div id="header">
    <span id="badge">限時優惠</span>
    <span id="label"></span>
  </div>
  <div id="units"></div>
  <div id="ended" style="display:none;">優惠已截止</div>
</div>

<script>
(function () {
  var stages = [
    { name: 'VVIP 學員限定｜盲鳥優惠', end: '2026-06-18T03:59:00Z' },
    { name: '超早鳥優惠',               end: '2026-06-28T15:59:00Z' },
    { name: '早鳥優惠',                 end: '2026-07-12T15:59:00Z' },
    { name: '預購優惠',                 end: '2026-07-24T03:59:00Z' }
  ];

  function getStage() {
    var now = new Date();
    for (var i = 0; i < stages.length; i++)
      if (now < new Date(stages[i].end)) return stages[i];
    return null;
  }

  var cur = getStage();
  if (!cur) {
    document.getElementById('header').style.display = 'none';
    document.getElementById('ended').style.display = 'block';
    return;
  }
  document.getElementById('label').textContent = cur.name + '　倒數中';

  var unitDefs = [
    { key: 'd', label: '天' },
    { key: 'h', label: '時' },
    { key: 'm', label: '分' },
    { key: 's', label: '秒' }
  ];

  var cont = document.getElementById('units');
  var tiles = {}; // tiles['d'] = [tensUl, onesUl]

  function makeTile() {
    var ul = document.createElement('ul');
    ul.className = 'flip';

    ['before', 'active'].forEach(function (cls) {
      var li = document.createElement('li');
      li.className = cls;
      var a = document.createElement('a');

      ['up', 'down'].forEach(function (half) {
        var div = document.createElement('div');
        div.className = half;
        var shadow = document.createElement('div');
        shadow.className = 'shadow';
        var inn = document.createElement('div');
        inn.className = 'inn';
        inn.textContent = '0';
        div.appendChild(shadow);
        div.appendChild(inn);
        a.appendChild(div);
      });

      li.appendChild(a);
      ul.appendChild(li);
    });

    return ul;
  }

  function setTile(ul, digit) {
    var d = String(digit);
    ul.querySelectorAll('.inn').forEach(function (inn) { inn.textContent = d; });
  }

  function flipTile(ul, newDigit) {
    var active = ul.querySelector('li.active');
    var before = ul.querySelector('li.before');
    var curDigit = active.querySelector('.up .inn').textContent;
    var nd = String(newDigit);
    if (curDigit === nd) return;

    // Cancel previous cleanup timer so it doesn't kill the next animation
    if (ul._t) { clearTimeout(ul._t); ul._t = null; }

    before.querySelectorAll('.inn').forEach(function (inn) { inn.textContent = curDigit; });
    active.querySelectorAll('.inn').forEach(function (inn) { inn.textContent = nd; });

    ul.classList.remove('play');
    void ul.offsetWidth;
    ul.classList.add('play');

    ul._t = setTimeout(function () { ul.classList.remove('play'); ul._t = null; }, 1100);
  }

  unitDefs.forEach(function (u, i) {
    if (i > 0) {
      var sep = document.createElement('div');
      sep.className = 'colon';
      sep.textContent = ':';
      cont.appendChild(sep);
    }

    var group = document.createElement('div');
    group.className = 'unit-group';

    var digRow = document.createElement('div');
    digRow.className = 'digits';

    var tTile = makeTile();
    var oTile = makeTile();
    digRow.appendChild(tTile);
    digRow.appendChild(oTile);

    var lbl = document.createElement('span');
    lbl.className = 'unit-label';
    lbl.textContent = u.label;

    group.appendChild(digRow);
    group.appendChild(lbl);
    cont.appendChild(group);

    tiles[u.key] = [tTile, oTile];
  });

  var prev = { d: -1, h: -1, m: -1, s: -1 };

  function tick() {
    var stage = getStage();
    if (!stage) {
      document.getElementById('units').style.display = 'none';
      document.getElementById('header').style.display = 'none';
      document.getElementById('ended').style.display = 'block';
      return;
    }
    if (stage.name !== cur.name) {
      cur = stage;
      document.getElementById('label').textContent = cur.name + '　倒數中';
    }

    var diff = Math.max(0, Math.floor((new Date(stage.end) - new Date()) / 1000));
    var vals = {
      d: Math.floor(diff / 86400),
      h: Math.floor((diff % 86400) / 3600),
      m: Math.floor((diff % 3600) / 60),
      s: diff % 60
    };

    unitDefs.forEach(function (u) {
      var k = u.key, v = vals[k];
      var tens = Math.floor(v / 10);
      var ones = v % 10;

      if (prev[k] < 0) {
        // First tick: set without animation
        setTile(tiles[k][0], tens);
        setTile(tiles[k][1], ones);
      } else {
        var prevTens = Math.floor(prev[k] / 10);
        var prevOnes = prev[k] % 10;
        if (tens !== prevTens) flipTile(tiles[k][0], tens);
        if (ones !== prevOnes) flipTile(tiles[k][1], ones);
      }
      prev[k] = v;
    });
  }

  tick();
  setInterval(tick, 1000);
})();
</script>
</body>
</html>

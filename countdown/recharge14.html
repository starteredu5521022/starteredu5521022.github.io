<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: transparent; overflow: hidden; }
  iframe { width: 100%; height: 170px; border: 0; display: block; }
</style>
</head>
<body>
<div id="root"></div>
<script>
(function () {
  // 各漲價階段截止時間（UTC，來自 Havppen course_discount）
  var stages = [
    { name: 'VVIP 盲鳥優惠', end: '2026-06-18T03:59:00Z' },
    { name: '超早鳥優惠',    end: '2026-06-28T15:59:00Z' },
    { name: '早鳥優惠',      end: '2026-07-12T15:59:00Z' },
    { name: '預購優惠',      end: '2026-07-24T03:59:00Z' }
  ];

  var now = new Date();
  var cur = null;
  for (var i = 0; i < stages.length; i++) {
    if (now < new Date(stages[i].end)) { cur = stages[i]; break; }
  }
  if (!cur) return; // 所有優惠已結束，不顯示

  var e = encodeURIComponent(new Date(cur.end).toISOString());
  var src = 'https://tool.lifehacker.tw/countdown/embed?e=' + e
          + '&c=21A4B1&l=zh&s=ring&z=m&b=message';

  var iframe = document.createElement('iframe');
  iframe.src = src;
  iframe.style.cssText = 'width:100%;height:170px;border:0;display:block;';
  iframe.title = cur.name + ' 倒數中';
  document.getElementById('root').appendChild(iframe);
})();
</script>
</body>
</html>

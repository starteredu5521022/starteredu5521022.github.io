<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: transparent;
  font-family: -apple-system, BlinkMacSystemFont, "Noto Sans TC", "PingFang TC", sans-serif;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 170px;
  padding: 0 12px;
}

#wrapper {
  width: 100%;
  max-width: 640px;
  background: linear-gradient(135deg, #EBF4E6 0%, #e2f0da 100%);
  border-radius: 14px;
  border: 1px solid rgba(25,77,51,0.12);
  box-shadow: 0 2px 12px rgba(25,77,51,0.10), 0 1px 3px rgba(25,77,51,0.08);
  padding: 12px 20px 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}

#header {
  display: flex;
  align-items: center;
  gap: 8px;
}

#badge {
  background: #C0392B;
  color: #fff;
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 0.06em;
  padding: 2px 10px;
  border-radius: 20px;
  white-space: nowrap;
  line-height: 1.5;
}

#label {
  font-size: 18px;
  font-weight: 700;
  color: #194D33;
  letter-spacing: 0.03em;
  white-space: nowrap;
}

#units {
  display: flex;
  align-items: flex-start;
  gap: 6px;
}

.unit {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}

.colon {
  font-size: 30px;
  font-weight: 800;
  color: #194D33;
  opacity: 0.35;
  line-height: 1;
  margin-top: 10px;
}

/* ── Flip card ── */
.flip-card {
  position: relative;
  width: 58px;
  height: 64px;
  perspective: 400px;
}

/* shared num text style */
.n {
  position: absolute;
  left: 0; right: 0;
  height: 64px;
  line-height: 64px;
  text-align: center;
  font-size: 36px;
  font-weight: 800;
  color: #fff;
  letter-spacing: -1px;
}

/* top static half – clips to show upper 32px of the number */
.fc-top {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 32px;
  overflow: hidden;
  border-radius: 8px 8px 0 0;
  background: linear-gradient(180deg, #2d6b48 0%, #1e5c3a 100%);
  border-bottom: 1px solid rgba(0,0,0,0.28);
}
.fc-top .n { bottom: 0; }

/* bottom static half – clips to show lower 32px of the number */
.fc-bot {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 32px;
  overflow: hidden;
  border-radius: 0 0 8px 8px;
  background: #194D33;
  box-shadow: 0 4px 10px rgba(25,77,51,0.35);
}
.fc-bot .n { top: -32px; }

/* flip-top: old number, folds backward (z above static) */
.fc-flip-top {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 32px;
  overflow: hidden;
  border-radius: 8px 8px 0 0;
  background: linear-gradient(180deg, #2d6b48 0%, #1e5c3a 100%);
  border-bottom: 1px solid rgba(0,0,0,0.28);
  transform-origin: bottom center;
  z-index: 3;
  backface-visibility: hidden;
}
.fc-flip-top .n { bottom: 0; }

/* flip-bottom: new number, unfolds forward */
.fc-flip-bot {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 32px;
  overflow: hidden;
  border-radius: 0 0 8px 8px;
  background: #194D33;
  transform-origin: top center;
  transform: rotateX(90deg);
  z-index: 2;
  backface-visibility: hidden;
}
.fc-flip-bot .n { top: -32px; }

@keyframes flipTop {
  0%   { transform: rotateX(0deg); }
  100% { transform: rotateX(-90deg); }
}
@keyframes flipBot {
  0%   { transform: rotateX(90deg); }
  100% { transform: rotateX(0deg); }
}
.fc-flip-top.go { animation: flipTop 0.25s ease-in  forwards; }
.fc-flip-bot.go { animation: flipBot 0.25s ease-out 0.22s forwards; }

.unit-label {
  font-size: 18px;
  font-weight: 400;
  color: #194D33;
  opacity: 0.85;
}

#ended {
  font-size: 16px;
  font-weight: 700;
  color: #194D33;
  letter-spacing: 0.04em;
}
</style>
</head>
<body>

<div id="wrapper">
  <div id="header">
    <span id="badge">限時優惠</span>
    <span id="label"></span>
  </div>
  <div id="units"></div>
  <div id="ended" style="display:none;">優惠已截止</div>
</div>

<script>
(function () {
  var stages = [
    { name: 'VVIP 學員限定｜盲鳥優惠', end: '2026-06-18T03:59:00Z' },
    { name: '超早鳥優惠',               end: '2026-06-28T15:59:00Z' },
    { name: '早鳥優惠',                 end: '2026-07-12T15:59:00Z' },
    { name: '預購優惠',                 end: '2026-07-24T03:59:00Z' }
  ];

  function getStage() {
    var now = new Date();
    for (var i = 0; i < stages.length; i++)
      if (now < new Date(stages[i].end)) return stages[i];
    return null;
  }

  var cur = getStage();
  if (!cur) {
    document.getElementById('header').style.display = 'none';
    document.getElementById('ended').style.display = 'block';
    return;
  }
  document.getElementById('label').textContent = cur.name + '　倒數中';

  var keys = ['d', 'h', 'm', 's'];
  var lbls = ['天', '時', '分', '秒'];
  var prev = { d: -1, h: -1, m: -1, s: -1 };
  var els  = {};
  var cont = document.getElementById('units');

  keys.forEach(function (k, i) {
    if (i > 0) {
      var sep = document.createElement('div');
      sep.className = 'colon';
      sep.textContent = ':';
      cont.appendChild(sep);
    }

    var unit = document.createElement('div');
    unit.className = 'unit';

    // card HTML
    unit.innerHTML =
      '<div class="flip-card">' +
        '<div class="fc-top"><div class="n" id="ut-' + k + '">00</div></div>' +
        '<div class="fc-bot"><div class="n" id="ub-' + k + '">00</div></div>' +
        '<div class="fc-flip-top" id="ft-' + k + '"><div class="n">00</div></div>' +
        '<div class="fc-flip-bot" id="fb-' + k + '"><div class="n">00</div></div>' +
      '</div>' +
      '<span class="unit-label">' + lbls[i] + '</span>';

    cont.appendChild(unit);

    els[k] = {
      top:  document.getElementById('ut-' + k),
      bot:  document.getElementById('ub-' + k),
      ft:   document.getElementById('ft-' + k),
      fb:   document.getElementById('fb-' + k)
    };
  });

  function pad(n) { return n < 10 ? '0' + n : '' + n; }

  function flip(k, val) {
    var s   = pad(val);
    var e   = els[k];
    var old = e.top.textContent;

    e.ft.querySelector('.n').textContent = old;  // old number, folds back
    e.fb.querySelector('.n').textContent = s;    // new number, comes forward
    e.bot.textContent = s;                       // update static bottom immediately

    e.ft.classList.remove('go');
    e.fb.classList.remove('go');
    void e.ft.offsetWidth; // reflow

    e.ft.classList.add('go');
    e.fb.classList.add('go');

    setTimeout(function () {
      e.top.textContent = s;
      e.ft.classList.remove('go');
      e.fb.classList.remove('go');
      e.ft.querySelector('.n').textContent = s;
    }, 600);
  }

  function tick() {
    var stage = getStage();
    if (!stage) {
      document.getElementById('units').style.display = 'none';
      document.getElementById('header').style.display = 'none';
      document.getElementById('ended').style.display = 'block';
      return;
    }
    if (stage.name !== cur.name) {
      cur = stage;
      document.getElementById('label').textContent = cur.name + '　倒數中';
    }

    var diff = Math.max(0, Math.floor((new Date(stage.end) - new Date()) / 1000));
    var vals = {
      d: Math.floor(diff / 86400),
      h: Math.floor((diff % 86400) / 3600),
      m: Math.floor((diff % 3600) / 60),
      s: diff % 60
    };

    keys.forEach(function (k) {
      if (vals[k] !== prev[k]) {
        flip(k, vals[k]);
        prev[k] = vals[k];
      }
    });
  }

  tick();
  setInterval(tick, 1000);
})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: transparent;
    font-family: -apple-system, BlinkMacSystemFont, "Noto Sans TC", "PingFang TC", sans-serif;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 170px;
    padding: 0 12px;
  }

  #wrapper {
    width: 100%;
    max-width: 640px;
    background: linear-gradient(135deg, #EBF4E6 0%, #e2f0da 100%);
    border-radius: 14px;
    border: 1px solid rgba(25, 77, 51, 0.12);
    box-shadow: 0 2px 12px rgba(25, 77, 51, 0.10), 0 1px 3px rgba(25, 77, 51, 0.08);
    padding: 14px 20px 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  #header {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  #badge {
    background: #C0392B;
    color: #ffffff;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.06em;
    padding: 2px 10px;
    border-radius: 20px;
    white-space: nowrap;
    line-height: 1.5;
  }

  #label {
    font-size: 16px;
    font-weight: 700;
    color: #194D33;
    letter-spacing: 0.03em;
    white-space: nowrap;
  }

  #rings {
    display: flex;
    gap: 8px;
    align-items: center;
    justify-content: center;
  }

  .ring-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
  }

  .ring-svg { display: block; }

  .ring-bg {
    fill: rgba(255, 255, 255, 0.65);
    stroke: rgba(25, 77, 51, 0.15);
    stroke-width: 4.5;
  }

  .ring-fg {
    fill: none;
    stroke: url(#greenGrad);
    stroke-width: 4.5;
    stroke-linecap: round;
    transform-origin: center;
    transform: rotate(-90deg);
    transition: stroke-dashoffset 0.5s ease;
    filter: drop-shadow(0 0 2px rgba(25, 77, 51, 0.25));
  }

  .ring-num {
    font-size: 21px;
    font-weight: 800;
    fill: #194D33;
    dominant-baseline: central;
    text-anchor: middle;
    letter-spacing: -0.5px;
  }

  .ring-unit {
    font-size: 18px;
    font-weight: 400;
    color: #194D33;
    opacity: 0.85;
    letter-spacing: 0.05em;
  }

  @keyframes spinSec {
    from { transform: rotate(-90deg); }
    to   { transform: rotate(270deg); }
  }
  .spin-ring {
    fill: none;
    stroke: rgba(25, 77, 51, 0.5);
    stroke-width: 2.5;
    stroke-linecap: round;
    stroke-dasharray: 22 167;
    transform-origin: center;
    animation: spinSec 1s linear infinite;
  }

  .sep {
    font-size: 22px;
    font-weight: 700;
    color: #194D33;
    opacity: 0.4;
    margin-bottom: 14px;
    line-height: 1;
  }

  #ended {
    font-size: 16px;
    font-weight: 700;
    color: #194D33;
    letter-spacing: 0.04em;
  }
</style>
</head>
<body>

<div id="wrapper">
  <div id="header">
    <span id="badge">限時優惠</span>
    <span id="label"></span>
  </div>
  <div id="rings"></div>
  <div id="ended" style="display:none;">優惠已截止</div>
</div>

<svg width="0" height="0" style="position:absolute">
  <defs>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d8c56"/>
      <stop offset="100%" style="stop-color:#194D33"/>
    </linearGradient>
  </defs>
</svg>

<script>
(function () {
  var stages = [
    { name: 'VVIP 學員限定｜盲鳥優惠', end: '2026-06-18T03:59:00Z' },
    { name: '超早鳥優惠',               end: '2026-06-28T15:59:00Z' },
    { name: '早鳥優惠',                 end: '2026-07-12T15:59:00Z' },
    { name: '預購優惠',                 end: '2026-07-24T03:59:00Z' }
  ];

  function getCurrentStage() {
    var now = new Date();
    for (var i = 0; i < stages.length; i++) {
      if (now < new Date(stages[i].end)) return stages[i];
    }
    return null;
  }

  var cur = getCurrentStage();
  if (!cur) {
    document.getElementById('rings').style.display = 'none';
    document.getElementById('header').style.display = 'none';
    document.getElementById('ended').style.display = 'block';
    return;
  }

  document.getElementById('label').textContent = cur.name + '　倒數中';

  var R = 30, C = 2 * Math.PI * R;
  var units = [
    { key: 'd', label: '天',  max: 99 },
    { key: 'h', label: '時',  max: 24 },
    { key: 'm', label: '分',  max: 60 },
    { key: 's', label: '秒',  max: 60 }
  ];

  var rings = document.getElementById('rings');
  var fgEls = {}, numEls = {};

  units.forEach(function (u, i) {
    if (i > 0) {
      var sepEl = document.createElement('span');
      sepEl.className = 'sep';
      sepEl.textContent = ':';
      rings.appendChild(sepEl);
    }

    var wrap = document.createElement('div');
    wrap.className = 'ring-wrap';

    var size = (R + 8) * 2;
    var cx = size / 2, cy = size / 2;

    var spinLayer = u.key === 's'
      ? '<circle class="spin-ring" cx="' + cx + '" cy="' + cy + '" r="' + R + '"/>'
      : '';
    wrap.innerHTML =
      '<svg class="ring-svg" width="' + size + '" height="' + size + '" viewBox="0 0 ' + size + ' ' + size + '">' +
        '<circle class="ring-bg" cx="' + cx + '" cy="' + cy + '" r="' + R + '"/>' +
        '<circle class="ring-fg" id="fg-' + u.key + '" cx="' + cx + '" cy="' + cy + '" r="' + R + '"' +
          ' stroke-dasharray="' + C + '" stroke-dashoffset="' + C + '"/>' +
        spinLayer +
        '<text class="ring-num" id="num-' + u.key + '" x="' + cx + '" y="' + cy + '">0</text>' +
      '</svg>' +
      '<span class="ring-unit">' + u.label + '</span>';

    rings.appendChild(wrap);
    fgEls[u.key] = document.getElementById('fg-' + u.key);
    numEls[u.key] = document.getElementById('num-' + u.key);
  });

  function setRing(key, val, max) {
    var ratio = Math.max(0, Math.min(1, val / max));
    fgEls[key].style.strokeDashoffset = C * (1 - ratio);
    numEls[key].textContent = val < 10 ? '0' + val : val;
  }

  function tick() {
    var now = new Date();
    var stage = getCurrentStage();

    if (!stage) {
      document.getElementById('rings').style.display = 'none';
      document.getElementById('header').style.display = 'none';
      document.getElementById('ended').style.display = 'block';
      return;
    }

    if (stage.name !== cur.name) {
      cur = stage;
      document.getElementById('label').textContent = cur.name + '　倒數中';
    }

    var diff = Math.max(0, Math.floor((new Date(stage.end) - now) / 1000));
    var d = Math.floor(diff / 86400);
    var h = Math.floor((diff % 86400) / 3600);
    var m = Math.floor((diff % 3600) / 60);
    var s = diff % 60;

    setRing('d', d, 99);
    setRing('h', h, 24);
    setRing('m', m, 60);
    setRing('s', s, 60);
  }

  tick();
  setInterval(tick, 1000);
})();
</script>
</body>
</html>
